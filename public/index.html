<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>致翁翁的星光贺卡</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Ma+Shan+Zheng&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-pale: #F5E6C0;
    --champagne: #F7E7C6;
    --ivory: #FDF8F0;
    --purple: #6B4E8E;
    --card-width: 380px;
    --card-height: 560px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 20% 20%, #0D0820 0%, #1A1230 40%, #0A0A14 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
  }

  #starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  .constellation {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 700px; height: 700px;
    opacity: 0.06; z-index: 0; pointer-events: none;
  }

  .particle {
    position: fixed; border-radius: 50%;
    background: var(--gold-light); pointer-events: none;
    animation: floatUp linear infinite; z-index: 0;
  }

  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-20vh) scale(1); opacity: 0; }
  }

  #scene {
    position: relative; z-index: 10;
    perspective: 1200px;
    width: var(--card-width);
    height: var(--card-height);
  }

  #envelope-wrap {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  #envelope-wrap.hidden { opacity: 0; transform: scale(0.8); pointer-events: none; }

  .envelope {
    width: 320px; height: 220px;
    position: relative; cursor: pointer;
    filter: drop-shadow(0 20px 60px rgba(201,168,76,0.4));
    transition: transform 0.3s ease, filter 0.3s ease;
  }
  .envelope:hover {
    transform: translateY(-8px) scale(1.02);
    filter: drop-shadow(0 30px 80px rgba(201,168,76,0.6));
  }

  .envelope-body {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #F5E6C0 0%, #E8D4A0 50%, #D4B870 100%);
    border-radius: 4px 4px 8px 8px;
    position: relative; border: 1px solid var(--gold);
  }
  .envelope-body::before {
    content: ''; position: absolute;
    bottom: 0; left: 0; right: 0; height: 55%;
    background: linear-gradient(135deg, #EDD99A 0%, #C9A84C 100%);
    clip-path: polygon(0 100%, 50% 0%, 100% 100%);
  }
  .envelope-body::after {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 55%;
    background: linear-gradient(135deg, #C9A84C 0%, #A8882A 100%);
    clip-path: polygon(0 0, 50% 100%, 100% 0);
    z-index: 2;
    transition: transform 0.8s cubic-bezier(0.4,0,0.2,1);
    transform-origin: top center;
  }
  .envelope.open::after { transform: rotateX(-180deg); }

  .envelope-seal {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 50px; height: 50px;
    background: radial-gradient(circle, #8B6914 0%, #C9A84C 60%, #8B6914 100%);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; z-index: 3;
    box-shadow: 0 0 20px rgba(201,168,76,0.6);
    transition: opacity 0.3s ease;
  }
  .envelope.open .envelope-seal { opacity: 0; }

  .envelope-hint {
    margin-top: 24px; color: var(--gold-light);
    font-size: 15px; letter-spacing: 3px;
    text-transform: uppercase; opacity: 0.8;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

  #card-wrap {
    position: absolute; inset: 0;
    opacity: 0; pointer-events: none;
    transform: rotateY(90deg);
    transition: opacity 0.6s ease 0.4s, transform 0.8s cubic-bezier(0.4,0,0.2,1) 0.3s;
  }
  #card-wrap.visible { opacity: 1; pointer-events: all; transform: rotateY(0deg); }

  .card {
    width: 100%; height: 100%;
    background: linear-gradient(160deg, #FDF8F0 0%, #F7EDD8 40%, #EED9A8 100%);
    border-radius: 16px;
    border: 1px solid rgba(201,168,76,0.4);
    box-shadow: 0 40px 100px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.8);
    padding: 32px 28px 24px;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: '♉'; position: absolute;
    top: -20px; right: -20px; font-size: 120px;
    opacity: 0.04; color: var(--gold); transform: rotate(-15deg);
  }

  .card-ornament {
    text-align: center; color: var(--gold);
    font-size: 11px; letter-spacing: 4px;
    text-transform: uppercase; margin-bottom: 10px; opacity: 0.7;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px; font-style: italic;
    color: #6B4A0A; text-align: center;
    line-height: 1.2; margin-bottom: 4px;
  }
  .card-subtitle {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 13px; color: var(--gold);
    text-align: center; letter-spacing: 3px;
    margin-bottom: 16px; opacity: 0.8;
  }
  .card-divider {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .card-divider::before,.card-divider::after {
    content:''; flex:1; height:1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .card-divider span { color: var(--gold); font-size: 14px; }

  #letter-text {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 15px; line-height: 1.9;
    color: #4A3208; flex: 1;
    min-height: 200px; position: relative;
  }

  #assistant-label {
    display: none;
    font-family: 'Playfair Display', serif;
    font-style: italic; font-size: 22px;
    color: var(--gold); text-align: center;
    margin: auto 0; opacity: 0.85;
    flex: 1; align-items: center; justify-content: center;
  }

  #chat-area {
    display: none;
    flex-direction: column; gap: 8px;
    flex: 1; overflow-y: auto;
    padding-right: 4px;
  }
  #chat-area::-webkit-scrollbar { width: 3px; }
  #chat-area::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

  .bubble {
    max-width: 85%; padding: 8px 12px;
    border-radius: 12px; line-height: 1.6;
    font-family: 'Ma Shan Zheng', cursive; font-size: 14px;
  }
  .bubble.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #C9A84C, #A8882A);
    color: #FDF8F0; border-radius: 12px 12px 2px 12px;
  }
  .bubble.ai {
    align-self: flex-start;
    background: rgba(201,168,76,0.15);
    color: #4A3208; border-radius: 12px 12px 12px 2px;
    border: 1px solid rgba(201,168,76,0.3);
  }

  #typed-content { display: inline; }
  .cursor-blink {
    display: inline-block; width: 2px; height: 16px;
    background: var(--gold); vertical-align: middle;
    margin-left: 2px; animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .card-signature {
    font-family: 'Playfair Display', serif; font-style: italic;
    font-size: 14px; color: var(--gold); text-align: right;
    margin-top: 10px; opacity: 0; transition: opacity 1s ease;
  }
  .card-signature.visible { opacity: 1; }

  #mic-area {
    margin-top: 12px; display: flex;
    flex-direction: column; align-items: center; gap: 6px;
    opacity: 0; transition: opacity 0.8s ease;
  }
  #mic-area.visible { opacity: 1; }

  #mic-btn {
    width: 52px; height: 52px; border-radius: 50%;
    border: 2px solid var(--gold);
    background: linear-gradient(135deg, rgba(201,168,76,0.1), rgba(201,168,76,0.2));
    color: var(--gold); font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
    box-shadow: 0 0 20px rgba(201,168,76,0.2);
  }
  #mic-btn:hover {
    background: linear-gradient(135deg, rgba(201,168,76,0.25), rgba(201,168,76,0.4));
    box-shadow: 0 0 30px rgba(201,168,76,0.5); transform: scale(1.05);
  }
  #mic-btn.listening {
    border-color: #E8C97A;
    animation: breathe 1.5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { box-shadow: 0 0 20px rgba(201,168,76,0.4), 0 0 0 0 rgba(201,168,76,0.3); }
    50% { box-shadow: 0 0 40px rgba(201,168,76,0.7), 0 0 0 16px rgba(201,168,76,0); }
  }
  .mic-label { font-size: 11px; letter-spacing: 2px; color: var(--gold); opacity: 0.6; text-transform: uppercase; }

  #open-btn {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    z-index: 20; padding: 12px 36px;
    background: linear-gradient(135deg, #C9A84C, #A8882A, #C9A84C);
    background-size: 200% 100%;
    border: none; border-radius: 40px;
    color: #FDF8F0; font-family: 'Cormorant Garamond', serif;
    font-size: 15px; letter-spacing: 4px; text-transform: uppercase;
    cursor: pointer; box-shadow: 0 8px 30px rgba(201,168,76,0.4);
    transition: all 0.4s ease; animation: shimmer 3s ease infinite;
  }
  @keyframes shimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
  #open-btn:hover { transform: translateX(-50%) translateY(-3px); box-shadow: 0 14px 40px rgba(201,168,76,0.6); }

  .ai-thinking {
    font-size: 12px; color: var(--gold); opacity: 0.6;
    text-align: center; letter-spacing: 2px;
    animation: pulse 1s ease-in-out infinite;
  }

  @media (max-width: 420px) {
    :root { --card-width: 320px; --card-height: 520px; }
    .card { padding: 26px 20px 20px; }
    .card-title { font-size: 22px; }
  }
</style>
</head>

<div id="scene">
  <div id="envelope-wrap">
    <div class="envelope" id="envelope" onclick="openEnvelope()">
      <div class="envelope-body">

  <div id="card-wrap">

      <div id="letter-text">
        <span id="typed-content"></span><span class="cursor-blink" id="cursor"></span>

      <div id="assistant-label">彬哥助理 ✨</div>

      <div class="card-signature" id="signature">— 彬哥 敬上 🥂</div>

      <div id="mic-area">
        <button id="mic-btn" onclick="toggleMic()" title="按下说话">🎤</button>
        <div class="mic-label" id="mic-label">按下与我对话</div>
      </div>
    </div>
  </div>
</div>

<button id="open-btn" onclick="startBlessing()">✦ 开启祝福 ✦</button>

const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = Array.from({length: 200}, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  r: Math.random() * 1.5 + 0.2,
  speed: Math.random() * 0.01 + 0.003,
  phase: Math.random() * Math.PI * 2
}));

function drawStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    const alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(232,201,122,${alpha})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);
