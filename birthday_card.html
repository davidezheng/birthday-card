<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>致翁翁的星光贺卡</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Ma+Shan+Zheng&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-pale: #F5E6C0;
    --champagne: #F7E7C6;
    --ivory: #FDF8F0;
    --purple: #6B4E8E;
    --purple-light: #9B7BB8;
    --dark: #1A1208;
    --card-width: 380px;
    --card-height: 520px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 20% 20%, #0D0820 0%, #1A1230 40%, #0A0A14 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    cursor: default;
  }

  /* ── 星空背景 ── */
  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* 金牛座星象 */
  .constellation {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 700px;
    height: 700px;
    opacity: 0.06;
    z-index: 0;
    pointer-events: none;
  }

  /* 粒子 */
  .particle {
    position: fixed;
    border-radius: 50%;
    background: var(--gold-light);
    pointer-events: none;
    animation: float linear infinite;
    z-index: 0;
  }

  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-20vh) scale(1); opacity: 0; }
  }

  /* ── 信封容器 ── */
  #scene {
    position: relative;
    z-index: 10;
    perspective: 1200px;
    width: var(--card-width);
    height: var(--card-height);
  }

  /* 信封 */
  #envelope-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  #envelope-wrap.hidden {
    opacity: 0;
    transform: scale(0.8);
    pointer-events: none;
  }

  .envelope {
    width: 320px;
    height: 220px;
    position: relative;
    cursor: pointer;
    filter: drop-shadow(0 20px 60px rgba(201,168,76,0.4));
    transition: transform 0.3s ease, filter 0.3s ease;
  }

  .envelope:hover {
    transform: translateY(-8px) scale(1.02);
    filter: drop-shadow(0 30px 80px rgba(201,168,76,0.6));
  }

  .envelope-body {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #F5E6C0 0%, #E8D4A0 50%, #D4B870 100%);
    border-radius: 4px 4px 8px 8px;
    position: relative;
    border: 1px solid var(--gold);
  }

  .envelope-body::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 55%;
    background: linear-gradient(135deg, #EDD99A 0%, #C9A84C 100%);
    clip-path: polygon(0 100%, 50% 0%, 100% 100%);
    border-top: 1px solid rgba(201,168,76,0.3);
  }

  .envelope-body::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 55%;
    background: linear-gradient(135deg, #C9A84C 0%, #A8882A 100%);
    clip-path: polygon(0 0, 50% 100%, 100% 0);
    z-index: 2;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    transform-origin: top center;
  }

  .envelope.open::after {
    transform: rotateX(-180deg);
  }

  .envelope-seal {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 50px;
    height: 50px;
    background: radial-gradient(circle, #8B6914 0%, #C9A84C 60%, #8B6914 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    z-index: 3;
    box-shadow: 0 0 20px rgba(201,168,76,0.6), inset 0 2px 4px rgba(255,255,255,0.2);
    transition: opacity 0.3s ease;
  }

  .envelope.open .envelope-seal {
    opacity: 0;
  }

  .envelope-hint {
    margin-top: 24px;
    color: var(--gold-light);
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.8;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ── 贺卡（翻转卡片）── */
  #card-wrap {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transform: rotateY(90deg);
    transition: opacity 0.6s ease 0.4s, transform 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.3s;
    transform-style: preserve-3d;
  }

  #card-wrap.visible {
    opacity: 1;
    pointer-events: all;
    transform: rotateY(0deg);
  }

  .card {
    width: 100%;
    height: 100%;
    background: linear-gradient(160deg, #FDF8F0 0%, #F7EDD8 40%, #EED9A8 100%);
    border-radius: 16px;
    border: 1px solid rgba(201,168,76,0.4);
    box-shadow:
      0 40px 100px rgba(0,0,0,0.5),
      0 0 0 1px rgba(201,168,76,0.2),
      inset 0 1px 0 rgba(255,255,255,0.8);
    padding: 36px 32px 28px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '♉';
    position: absolute;
    top: -20px;
    right: -20px;
    font-size: 120px;
    opacity: 0.04;
    color: var(--gold);
    transform: rotate(-15deg);
  }

  .card-ornament {
    text-align: center;
    color: var(--gold);
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.7;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-style: italic;
    color: #6B4A0A;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 6px;
    text-shadow: 0 1px 3px rgba(201,168,76,0.2);
  }

  .card-subtitle {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 13px;
    color: var(--gold);
    text-align: center;
    letter-spacing: 3px;
    margin-bottom: 20px;
    opacity: 0.8;
  }

  .card-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }

  .card-divider::before,
  .card-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .card-divider span {
    color: var(--gold);
    font-size: 14px;
  }

  /* 文字区域 */
  #letter-text {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 16px;
    line-height: 2;
    color: #4A3208;
    flex: 1;
    position: relative;
    min-height: 160px;
  }

  #typed-content {
    display: inline;
  }

  .cursor-blink {
    display: inline-block;
    width: 2px;
    height: 18px;
    background: var(--gold);
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* 签名 */
  .card-signature {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--gold);
    text-align: right;
    margin-top: 12px;
    opacity: 0;
    transition: opacity 1s ease;
  }

  .card-signature.visible { opacity: 1; }

  /* ── 麦克风按钮 ── */
  #mic-area {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  #mic-area.visible { opacity: 1; }

  #mic-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    background: linear-gradient(135deg, rgba(201,168,76,0.1), rgba(201,168,76,0.2));
    color: var(--gold);
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    position: relative;
    box-shadow: 0 0 20px rgba(201,168,76,0.2);
  }

  #mic-btn:hover {
    background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0.35));
    box-shadow: 0 0 30px rgba(201,168,76,0.4);
    transform: scale(1.05);
  }

  #mic-btn.listening {
    border-color: #E8C97A;
    background: radial-gradient(circle, rgba(201,168,76,0.3), rgba(201,168,76,0.1));
    animation: breathe 1.5s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { box-shadow: 0 0 20px rgba(201,168,76,0.4), 0 0 0 0 rgba(201,168,76,0.3); }
    50% { box-shadow: 0 0 40px rgba(201,168,76,0.7), 0 0 0 16px rgba(201,168,76,0); }
  }

  .mic-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--gold);
    opacity: 0.6;
    text-transform: uppercase;
  }

  /* ── 开启按钮 ── */
  #open-btn {
    margin-top: 20px;
    padding: 12px 36px;
    background: linear-gradient(135deg, #C9A84C, #A8882A, #C9A84C);
    background-size: 200% 100%;
    border: none;
    border-radius: 40px;
    color: #FDF8F0;
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(201,168,76,0.4);
    transition: all 0.4s ease;
    animation: shimmer 3s ease infinite;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  #open-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 40px rgba(201,168,76,0.6);
  }

  /* ── 响应式 ── */
  @media (max-width: 420px) {
    :root { --card-width: 320px; --card-height: 480px; }
    .card { padding: 28px 24px 22px; }
    .card-title { font-size: 24px; }
  }
</style>
</head>
<body>

<!-- 星空画布 -->
<canvas id="starfield"></canvas>

<!-- 金牛座星象 SVG -->
<svg class="constellation" viewBox="0 0 700 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Taurus constellation lines -->
  <circle cx="350" cy="350" r="4" fill="#C9A84C"/>
  <circle cx="290" cy="310" r="3" fill="#C9A84C"/>
  <circle cx="240" cy="280" r="5" fill="#C9A84C"/>
  <circle cx="200" cy="250" r="3" fill="#C9A84C"/>
  <circle cx="170" cy="220" r="4" fill="#C9A84C"/>
  <circle cx="160" cy="180" r="3" fill="#C9A84C"/>
  <circle cx="190" cy="170" r="3" fill="#C9A84C"/>
  <circle cx="150" cy="160" r="2" fill="#C9A84C"/>
  <circle cx="400" cy="330" r="3" fill="#C9A84C"/>
  <circle cx="450" cy="300" r="4" fill="#C9A84C"/>
  <circle cx="490" cy="270" r="3" fill="#C9A84C"/>
  <circle cx="520" cy="230" r="3" fill="#C9A84C"/>
  <circle cx="350" cy="400" r="3" fill="#C9A84C"/>
  <circle cx="320" cy="450" r="3" fill="#C9A84C"/>
  <circle cx="380" cy="460" r="4" fill="#C9A84C"/>
  <line x1="350" y1="350" x2="290" y2="310" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <line x1="290" y1="310" x2="240" y2="280" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <line x1="240" y1="280" x2="200" y2="250" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="250" x2="170" y2="220" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <line x1="170" y1="220" x2="160" y2="180" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <line x1="170" y1="220" x2="190" y2="170" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <line x1="350" y1="350" x2="400" y2="330" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="330" x2="450" y2="300" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <line x1="450" y1="300" x2="490" y2="270" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <line x1="350" y1="350" x2="350" y2="400" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <line x1="350" y1="400" x2="320" y2="450" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <line x1="350" y1="400" x2="380" y2="460" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
</svg>

<!-- 主场景 -->
<div id="scene">

  <!-- 信封 -->
  <div id="envelope-wrap">
    <div class="envelope" id="envelope" onclick="openEnvelope()">
      <div class="envelope-body">
        <div class="envelope-seal">♉</div>
      </div>
    </div>
    <div class="envelope-hint">点击开启惊喜</div>
  </div>

  <!-- 贺卡 -->
  <div id="card-wrap">
    <div class="card">
      <div class="card-ornament">✦ &nbsp; Taurus &nbsp; ✦</div>
      <div class="card-title">致亲爱的翁翁</div>
      <div class="card-subtitle">金牛座的专属祝福</div>
      <div class="card-divider"><span>✦</span></div>

      <div id="letter-text">
        <span id="typed-content"></span><span class="cursor-blink" id="cursor"></span>
      </div>

      <div class="card-signature" id="signature">— 彬 敬上 🌟</div>

      <div id="mic-area">
        <button id="mic-btn" onclick="toggleMic()" title="按下说话">🎤</button>
        <div class="mic-label">与翁翁对话</div>
      </div>
    </div>
  </div>

</div>

<!-- 开启祝福按钮（信封下方） -->
<div style="position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:20;" id="btn-wrap">
  <button id="open-btn" onclick="startBlessing()">✦ 开启祝福 ✦</button>
</div>

<script>
// ── 星空 ──
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = Array.from({length: 200}, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  r: Math.random() * 1.5 + 0.2,
  a: Math.random(),
  speed: Math.random() * 0.01 + 0.003,
  phase: Math.random() * Math.PI * 2
}));

function drawStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    const alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(232,201,122,${alpha})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);

// 粒子
function createParticle() {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 3 + 1;
  p.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}vw;
    animation-duration:${Math.random()*12+8}s;
    animation-delay:${Math.random()*8}s;
    opacity:${Math.random()*0.6+0.2};
  `;
  document.body.appendChild(p);
}
for (let i = 0; i < 25; i++) createParticle();

// ── 信封打开 ──
function openEnvelope() {
  const env = document.getElementById('envelope');
  env.classList.add('open');
}

// ── 开启祝福 ──
const letterText = `嗨 翁翁，

生日快乐！✨

你是最优秀的金牛座，
稳重、美好、闪耀着独特的光芒。

愿你的财富如金牛一样稳健，
愿你的生活如香槟一样甜美，
愿每一天都充满温柔与惊喜`;

let typingInterval = null;

function startBlessing() {
  openEnvelope();
  document.getElementById('btn-wrap').style.display = 'none';

  setTimeout(() => {
    document.getElementById('envelope-wrap').classList.add('hidden');
    setTimeout(() => {
      const cardWrap = document.getElementById('card-wrap');
      cardWrap.classList.add('visible');
      setTimeout(() => startTyping(), 600);
    }, 400);
  }, 1000);
}

function startTyping() {
  const el = document.getElementById('typed-content');
  const cursor = document.getElementById('cursor');
  const chars = letterText.split('');
  let i = 0;
  const duration = 8000;
  const interval = duration / chars.length;

  typingInterval = setInterval(() => {
    if (i < chars.length) {
      el.textContent += chars[i];
      i++;
    } else {
      clearInterval(typingInterval);
      cursor.style.display = 'none';
      document.getElementById('signature').classList.add('visible');
      document.getElementById('mic-area').classList.add('visible');
    }
  }, interval);
}

// ── 麦克风 ──
let isListening = false;
let recognition = null;

function toggleMic() {
  const btn = document.getElementById('mic-btn');
  if (!isListening) {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      alert('你的浏览器不支持语音识别，请使用 Chrome 浏览器 🌸');
      return;
    }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.onresult = (e) => {
      const text = e.results[0][0].transcript;
      replyToUser(text);
    };
    recognition.onend = () => stopListening();
    recognition.start();
    btn.classList.add('listening');
    btn.textContent = '🔴';
    isListening = true;
  } else {
    stopListening();
  }
}

function stopListening() {
  const btn = document.getElementById('mic-btn');
  if (recognition) recognition.stop();
  btn.classList.remove('listening');
  btn.textContent = '🎤';
  isListening = false;
}
const MISTRAL_KEY = '你的Mistral Key填这里';
const chatHistory = JSON.parse(localStorage.getItem('wongwong_history') || '[]');

async function replyToUser(input) {
  chatHistory.push({ role: 'user', content: input });
  localStorage.setItem('wongwong_history', JSON.stringify(chatHistory));

  try {
    const res = await fetch('https://api.mistral.ai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${MISTRAL_KEY}`
      },
      body: JSON.stringify({
        model: 'mistral-small-latest',
        messages: [
          { role: 'system', content: '你是翁翁的私人AI守护者，彬哥的助理。翁翁是优雅的金牛座女孩，父母掌上明珠。说话温柔幽默，用中文回答，简洁温暖。' },
          ...chatHistory
        ],
        max_tokens: 200,
        temperature: 0.8
      })
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || '抱歉我有点迷糊，再说一次 🌸';
    chatHistory.push({ role: 'assistant', content: reply });
    localStorage.setItem('wongwong_history', JSON.stringify(chatHistory));
    speak(reply);
  } catch (e) {
    speak('网络有点问题，请再试一次 🌸');
  }
}


function speak(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'zh-CN';
    utter.rate = 0.9;
    utter.pitch = 1.1;
    window.speechSynthesis.speak(utter);
  }
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
